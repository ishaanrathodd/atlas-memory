name: Atlas Regression Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: atlas-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-replay:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio supabase pydantic httpx numpy

      - name: Run unit tests (excluding e2e)
        run: |
          PYTHONPATH=src python -m pytest tests -q --ignore=tests/test_e2e.py

      - name: Run replay eval regression gate
        run: |
          PYTHONPATH=src python - <<'PY'
          import asyncio
          import json
          import sys

          from memory.eval_harness import run_replay_eval

          report = asyncio.run(
            run_replay_eval(
              scenarios_file="tests/fixtures/replay_eval_scenarios.json",
              min_pass_rate=1.0,
            )
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          if not report.get("meets_threshold", False):
            sys.exit(1)
          PY
